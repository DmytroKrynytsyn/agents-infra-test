name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.timestamp.outputs.ts }}
    steps:
      - name: Generate build timestamp
        id: timestamp
        run: echo "ts=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

  build-gateway:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: |
            dkrinitsyn/agents-infra-test-gateway:latest
            dkrinitsyn/agents-infra-test-gateway:${{ needs.prepare.outputs.ts }}

  build-backend:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            dkrinitsyn/agents-infra-test-backend:latest
            dkrinitsyn/agents-infra-test-backend:${{ needs.prepare.outputs.ts }}

  update-tags:
    runs-on: ubuntu-latest
    needs: [prepare, build-gateway, build-backend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags
        run: |
          TS="${{ needs.prepare.outputs.ts }}"
          sed -i "s/tag: .*/tag: \"${TS}\"/" helm/gateway/values.yaml
          sed -i "s/tag: .*/tag: \"${TS}\"/" helm/backend/values.yaml

      - name: Commit updated values
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image tags to ${{ needs.prepare.outputs.ts }}"
          file_pattern: |
            helm/gateway/values.yaml
            helm/backend/values.yaml