apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agents-infra-test-gateway
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - {{ .Values.ingress.host }}
  rules:
    - backendRefs:
        - name: agents-infra-test-gateway
          port: {{ .Values.service.port }}